# Development Configuration for Risk Engine

spring:
  application:
    name: tax-risk-engine-dev

  datasource:
    url: jdbc:postgresql://localhost:5432/risk_engine_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      auto-offset-reset: earliest

risk-engine:
  batch:
    enabled: false
  cache:
    risk-profile-ttl: 300
    assessment-ttl: 600
  events:
    kafka-enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always

server:
  port: 8080

logging:
  level:
    root: INFO
    com.practice.risk: DEBUG
    org.hibernate.SQL: DEBUG