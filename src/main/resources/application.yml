spring:
  application:
    name: tax-risk-engine
  
  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/risk_engine_db
    username: risk_engine
    password:  # Updated fallback to your real password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate  # Validates tables against your Flyway scripts
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # Flyway Migration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public

  # Redis Cache Configuration
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      jedis:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5

  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      group-id: risk-engine-group
      auto-offset-reset: earliest
      enable-auto-commit: false
    properties:
      spring.json.trusted.packages: "com.practice.risk.domain.event"

  # Cache Configuration
  cache:
    type: redis
    redis:
      time-to-live: 900000  # 15 minutes default
      cache-null-values: false

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# Risk Engine Specific Configuration
risk-engine:
  scoring:
    categories:
      filing-compliance:
        weight: 0.25
      payment-compliance:
        weight: 0.25
      financial-health:
        weight: 0.20
      transaction-analysis:
        weight: 0.15
      behavioral-patterns:
        weight: 0.10
      industry-context:
        weight: 0.05
    thresholds:
      critical: 80.0
      high: 65.0
      medium: 40.0
    confidence:
      minimum-for-high-risk: 0.6
      minimum-for-critical: 0.7
  batch:
    enabled: true
    schedule: "0 2 * * *"  # 2 AM daily
    batch-size: 1000
    parallel-threads: 10
    timeout-minutes: 60
  random-selection:
    enabled: true
    percentage: 5.0
    audit-types:
      - DESK
      - ISSUE
  cache:
    risk-profile-ttl: 900
    assessment-ttl: 3600
    configuration-ttl: 300
    benchmark-ttl: 3600
  events:
    topic-prefix: tax-audit
    topics:
      assessment-completed: ${risk-engine.events.topic-prefix}.risk-assessment-completed
      critical-risk-alert: ${risk-engine.events.topic-prefix}.critical-risk-alert
      profile-updated: ${risk-engine.events.topic-prefix}.risk-profile-updated
  alerts:
    critical-risk-threshold: 85.0
    enabled: true

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
    metrics:
      enabled: true
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

# API Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: false

# Logging Configuration
logging:
  level:
    root: INFO
    com.practice.risk: DEBUG
    org.springframework.web: INFO
    org.springframework.kafka: WARN
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/risk-engine.log
    max-size: 10MB
    max-history: 30

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain